version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mobiloitte-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mobiloitte_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
